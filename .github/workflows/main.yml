# Это название пайплайна
# ${{secrets.HARDCODE_USER_PASSWORD}}
# ${{vars.UI_URL}}
name: pw7 автотесты UI/API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # ручной запуск
  workflow_dispatch:

jobs:
  pw7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
      - name: Установить пакет
        run: npm ci
      - name: Установить браузеры
        run: npx playwright install --with-deps
      - name: Запусти тесты
        run: npm run test
        env:
          UI_URL: ${{ vars.UI_URL }}
          API_URL: ${{ vars.API_URL }}
      - name: Генерируем отчет для телеграмм 
        run: npx allure-commandline generate allure-results -o allure-report --clean
        continue-on-error: true
        if: always()
      - name: Генерируем single-file отчет Allure 
        run: npx allure-commandline generate allure-results -o allure-report-single --clean --single-file
        continue-on-error: true
        if: always()
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: always()
        with:
          name: artifacts
          path: |
            allure-report
            allure-results
            playwright-report
            allure-report-single

      - name: Setup Java (требуется для запуска .jar)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        if: always()

      - name: Скачать Allure Notifications
        run: |
          mkdir -p notifications
          wget https://github.com/qa-guru/allure-notifications/releases/download/v5.0.2/allure-notifications-5.0.2.jar -O notifications/allure-notifications.jar
        if: always()

      - name: Создать config.json для уведомлений
        run: |
          cat <<EOF > notifications/config.json
          {
            "base": {
              "project": "RealWorldTests",
              "environment": "GitHub Actions",
              "comment": "CI Run",
              "language": "ru",
              "allureFolder": "allure-report/",
              "allureResultsFolder": "allure-results/",
              "enableChart": true,
              "chart": {
                "mode": "pie"
              },
              "links": {
                "report": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "build": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            },
            "telegram": {
              "token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "chat": "${{ secrets.TELEGRAM_CHAT_ID }}"
            }
          }
          EOF
        if: always()

      - name: Отправить уведомление в Telegram
        run: java "-DconfigFile=notifications/config.json" -jar notifications/allure-notifications.jar
        if: always()
